      <header style="padding: 20px; text-align: center; font-family: monospace;">
        <h1>Retro Music: Retro Brutalist Music Player & Jam Sharing</h1>
        <p>A premium, retro-brutalist styled music player built with React, Vite, Tailwind CSS, Express, and Socket.io. It integrates with JioSaavn API to stream real audio files and implements real-time room sharing (Jam together) and Firebase Google OAuth authentication.</p>
      </header>
      <main style="max-width: 800px; margin: 0 auto; padding: 20px; font-family: monospace;">
        <h2>Key Features of Retro Music Platform</h2>
        <ul>
          <li><strong>JioSaavn API Integration:</strong> Dynamically search, fetch, and play high-quality audio files directly from the JioSaavn database.</li>
          <li><strong>Dual Playback Engine:</strong> Seamlessly falls back between browser HTML5 audio streaming and vintage low-pass synthesizer audio beep swept frequencies.</li>
          <li><strong>Firebase Google OAuth:</strong> Login and sign up securely using your Google account.</li>
          <li><strong>Account-Based Syncing:</strong> Your recently played history, liked songs, custom playlists, and friends list are synced across devices.</li>
          <li><strong>Real-time Jam Together Stations:</strong> Launch your own streaming station or tune in to others to sync playback, seek position, play/pause actions, and chat live via WebSockets.</li>
        </ul>
        <p>Visit <a href="https://retro.geetprince.me">Retro Music</a> to start streaming your favorite tracks in a brutalist console environment.</p>
      </main>
    </noscript>
